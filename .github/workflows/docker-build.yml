name: Build and Push Docker Image

on:
  push:
    tags:
      - 'v*'
  # pull_request:
  #   branches:
  #     - main
  # workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: tartball

jobs:
  build:
    strategy:
      matrix:
        platform:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.platform.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/${{ matrix.platform.arch }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-${{ matrix.platform.arch }}
          provenance: false

  merge-manifest:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          set -e
          IMG="${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}"
          TAG="${{ github.ref_name }}"

          docker buildx imagetools create \
            --tag "${IMG}:${TAG}" \
            "${IMG}:${TAG}-amd64" \
            "${IMG}:${TAG}-arm64"

          # Strip 'v' prefix for semver tags
          if [[ "$TAG" == v* ]]; then
            SEMVER="${TAG#v}"
            MAJOR_MINOR="${SEMVER%.*}"

            docker buildx imagetools create \
              --tag "${IMG}:${SEMVER}" \
              "${IMG}:${TAG}-amd64" \
              "${IMG}:${TAG}-arm64"

            docker buildx imagetools create \
              --tag "${IMG}:${MAJOR_MINOR}" \
              "${IMG}:${TAG}-amd64" \
              "${IMG}:${TAG}-arm64"
          fi

          # latest tag
          docker buildx imagetools create \
            --tag "${IMG}:latest" \
            "${IMG}:${TAG}-amd64" \
            "${IMG}:${TAG}-arm64"
